<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iakov — start</title>
  <link rel="stylesheet" href="start.css" />
</head>
<body>
  <!-- Full-viewport background -->
  <div class="backdrop">
    <img class="bg" src="assets/bg.jpg" alt="" />
    <div class="grain"></div>
  </div>

  <div class="viewport">
    <div class="stage" data-weather="">
      <!-- Logo -->
      <img class="logo" src="assets/logo.svg" alt="iakov" />

      <!-- Search -->
      <form class="search" action="https://www.google.com/search" method="GET" autocomplete="off">
        <input
          class="search-input"
          type="text"
          name="q"
          placeholder="Search"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          enterkeyhint="search"
        />
        <button class="search-btn" type="submit" aria-label="Search">
          <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
            <path fill="currentColor" d="M9.5 16q-2.725 0-4.612-1.888T3 9.5t1.888-4.612T9.5 3t4.613 1.888T16 9.5q0 1.1-.35 2.075T14.7 13.3l5.6 5.6q.275.275.275.7t-.275.7t-.7.275t-.7-.275l-5.6-5.6q-.75.6-1.725.95T9.5 16m0-2q1.875 0 3.188-1.312T14 9.5t-1.312-3.187T9.5 5T6.313 6.313T5 9.5t1.313 3.188T9.5 14"/>
          </svg>
        </button>
      </form>

      <!-- Temperature widget -->
      <div class="widget temp">
        <span class="temp-value">23°C</span>
      </div>

      <!-- Weather widget -->
      <div class="widget weather"></div>

      <!-- Weather visuals (one shown per state) -->
      <img class="wx wx-cloudy" src="assets/weather/cloudy.png" alt="" />
      <div class="wx wx-sunny"><img src="assets/weather/sunny.png" alt="" /></div>
      <div class="wx wx-rainy"><img src="assets/weather/rainy.png" alt="" /></div>

      <!-- Year -->
      <div class="year">2026</div>
    </div>
  </div>

  <script src="start.js"></script>
</body>
</html>
